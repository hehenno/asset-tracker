<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@600;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f; --surface: #191919; --surface2: #222;
      --border: #2e2e2e; --text: #f0f0f0; --muted: #666;
      --accent: #b5ff5a; --accent-dim: rgba(181,255,90,0.12);
      --green: #4ade80; --green-dim: rgba(74,222,128,0.15);
      --red: #f87171;   --red-dim: rgba(248,113,113,0.15);
      --yellow: #fbbf24;--yellow-dim: rgba(251,191,36,0.15);
      --blue: #a78bfa;  --blue-dim: rgba(167,139,250,0.15);
      --cell: 130px; --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* TOPBAR */
    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; gap: 12px; height: 56px;
    }
    #topbar h1 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.03em; color: var(--accent); white-space: nowrap; }
    .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
    .spacer { flex: 1; }

    #search-wrap { position: relative; flex: 1; max-width: 300px; }
    #search-wrap .si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }
    #search-input { width: 100%; padding: 7px 30px 7px 30px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.72rem; outline: none; transition: border-color 0.15s; }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    #search-clear { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; line-height: 1; display: none; padding: 2px; }
    #search-clear:hover { color: var(--text); }
    #search-input.has-value ~ #search-clear { display: block; }

    #status-bar { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
    #status-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    #status-bar.synced .dot { background: var(--green); }
    #status-bar.saving .dot { background: var(--yellow); animation: pulse 1s infinite; }
    #status-bar.error .dot { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .tb-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.72rem; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, background 0.15s; }
    .tb-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
    .tb-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .tb-btn.danger { border-color: var(--red-dim); }
    .tb-btn.danger:hover { border-color: var(--red); background: var(--red-dim); }

    /* LAYOUT */
    #layout { display: flex; height: calc(100vh - 56px); }

    /* SIDEBAR */
    #sidebar { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .ss { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .sl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }

    .folder-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; font-size: 0.68rem; transition: border-color 0.15s, background 0.15s; }
    .folder-item:hover { border-color: var(--accent); background: var(--accent-dim); }
    .folder-item.linked { border-color: var(--green-dim); background: var(--green-dim); cursor: default; }
    .folder-item .fi-icon { font-size: 0.9rem; flex-shrink: 0; }
    .folder-item .fi-text { flex: 1; min-width: 0; }
    .folder-item .fi-label { font-size: 0.6rem; color: var(--muted); display: block; }
    .folder-item .fi-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .folder-item .fi-badge { font-size: 0.58rem; padding: 1px 5px; border-radius: 3px; background: var(--green-dim); color: var(--green); flex-shrink: 0; }

    .filter-btn { display: flex; align-items: center; gap: 7px; width: 100%; padding: 6px 10px; border-radius: var(--radius); border: 1px solid transparent; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.7rem; cursor: pointer; margin-bottom: 3px; transition: all 0.12s; text-align: left; }
    .filter-btn:hover { color: var(--text); background: var(--surface2); }
    .filter-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border); }
    .filter-btn .fb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .filter-btn .fb-count { margin-left: auto; font-size: 0.62rem; background: var(--surface); padding: 1px 6px; border-radius: 10px; }

    .tag-pill-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); font-size: 0.62rem; color: var(--muted); cursor: pointer; transition: all 0.12s; }
    .tag-pill:hover { border-color: var(--accent); color: var(--text); }
    .tag-pill.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .tag-pill .tp-n { opacity: 0.6; font-size: 0.58rem; }

    .cat-nav-item { display: flex; align-items: center; padding: 5px 10px; border-radius: var(--radius); font-size: 0.68rem; color: var(--muted); cursor: pointer; margin-bottom: 2px; transition: all 0.12s; text-transform: capitalize; }
    .cat-nav-item:hover { color: var(--text); background: var(--surface2); }
    .cat-nav-item .cn-c { margin-left: auto; font-size: 0.6rem; }

    .size-btns { display: flex; gap: 6px; }
    .size-btn { flex: 1; padding: 5px 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: all 0.15s; }
    .size-btn:hover { border-color: var(--accent); color: var(--accent); }
    .size-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    input[type=range] { flex: 1; accent-color: var(--accent); height: 3px; cursor: pointer; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.7rem; color: var(--muted); }
    .toggle-switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; border-radius: 18px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; transition: background 0.2s, border-color 0.2s; }
    .toggle-track::after { content: ''; position: absolute; width: 12px; height: 12px; border-radius: 50%; background: var(--muted); top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
    .toggle-switch input:checked + .toggle-track { background: var(--accent-dim); border-color: var(--accent); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(14px); background: var(--accent); }

    /* MAIN */
    #main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px; }
    #main::-webkit-scrollbar { width: 5px; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* SETUP SCREEN */
    #setup-screen { max-width: 560px; margin: 50px auto; }
    .setup-title { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .setup-title span { color: var(--accent); }
    .setup-sub { color: var(--muted); font-size: 0.8rem; line-height: 1.6; margin-bottom: 28px; }

    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 12px; }
    .setup-card h3 { font-family: 'Syne', sans-serif; font-size: 0.9rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .setup-card .step-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 0.68rem; flex-shrink: 0; }
    .setup-card.done .step-badge { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .setup-card p { font-size: 0.7rem; color: var(--muted); margin: 6px 0 14px; line-height: 1.6; }
    .setup-card p code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--text); font-size: 0.68rem; }
    .setup-input-row { display: flex; gap: 8px; }
    .setup-input {
      flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 0.72rem; outline: none;
      transition: border-color 0.15s;
    }
    .setup-input:focus { border-color: var(--accent); }
    .setup-input::placeholder { color: var(--muted); }
    .setup-btn { padding: 8px 16px; border-radius: var(--radius); background: var(--accent); color: #000; border: none; font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .setup-btn:hover { background: #c8ff70; }
    .setup-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .setup-btn.secondary:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
    .setup-card.done { border-color: var(--green-dim); background: rgba(74,222,128,0.05); }
    .setup-done-row { display: flex; align-items: center; gap: 10px; font-size: 0.72rem; color: var(--green); }
    .setup-done-row .sd-val { color: var(--muted); font-size: 0.68rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .setup-hint { margin-top: 16px; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 0.7rem; color: var(--muted); line-height: 1.7; }
    .setup-hint strong { color: var(--accent); }
    .setup-hint a { color: var(--blue); }

    .no-support { background: var(--red-dim); border: 1px solid var(--red); border-radius: 8px; padding: 16px; font-size: 0.78rem; color: var(--red); line-height: 1.6; }

    /* SEARCH BANNER */
    #search-banner { display: none; padding: 8px 14px; margin-bottom: 20px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); font-size: 0.72rem; color: var(--muted); align-items: center; gap: 8px; }
    #search-banner.vis { display: flex; }
    #search-banner strong { color: var(--text); }
    #search-banner .sbc { margin-left: auto; cursor: pointer; color: var(--accent); }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .esi { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.8rem; }

    /* GALLERY */
    .cat-section { margin-bottom: 40px; }
    .cat-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .cat-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; text-transform: capitalize; }
    .cat-count { font-size: 0.65rem; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 10px; }
    .cat-stats { margin-left: auto; display: flex; gap: 8px; }
    .cat-stat { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: var(--muted); }
    .csd { width: 6px; height: 6px; border-radius: 50%; }

    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--cell), 1fr)); gap: 10px; }

    .asset-item { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: border-color 0.12s, transform 0.1s; overflow: hidden; }
    .asset-item:hover { border-color: #444; transform: translateY(-1px); }
    .asset-item.s-green  { border-color: rgba(74,222,128,0.4);  background: var(--green-dim); }
    .asset-item.s-red    { border-color: rgba(248,113,113,0.3); background: var(--red-dim); }
    .asset-item.s-yellow { border-color: rgba(251,191,36,0.4);  background: var(--yellow-dim); }
    .asset-item.s-blue   { border-color: rgba(96,165,250,0.4);  background: var(--blue-dim); }
    body.no-tint .asset-item.s-green,
    body.no-tint .asset-item.s-red,
    body.no-tint .asset-item.s-yellow,
    body.no-tint .asset-item.s-blue { background: var(--surface); border-color: var(--border); }

    .asset-item img { width: 100%; height: calc(var(--cell) * 0.7); object-fit: contain; display: block; }
    .asset-name { font-size: 0.6rem; margin-top: 6px; color: var(--muted); text-align: center; word-break: break-all; line-height: 1.3; width: 100%; }
    body.hide-names .asset-name { display: none; }

    .asset-tags { display: none; }
    .asset-tag-chip { font-size: 0.55rem; padding: 1px 5px; border-radius: 10px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); cursor: pointer; transition: all 0.1s; }
    .asset-tag-chip:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    body.hide-names .asset-tags { display: none; }

    .status-pip { position: absolute; bottom: 5px; left: 5px; width: 16px; height: 16px; border-radius: 50%; }
    .pip-green  { background: var(--green); }
    .pip-red    { background: var(--red); }
    .pip-yellow { background: var(--yellow); }
    .pip-blue   { background: var(--blue); box-shadow: 0 0 6px var(--blue); }

    .tag-btn { position: absolute; top: 4px; left: 4px; width: 18px; height: 18px; border-radius: 50%; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5; transition: all 0.1s; }
    .asset-item:hover .tag-btn, .asset-item.has-tags .tag-btn { display: flex; }
    .tag-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    body:not(.edit-mode) .tag-btn { display: none !important; }

    /* TAG MODAL */
    #tm-backdrop { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    #tm-backdrop.open { display: flex; }
    #tm-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 380px; max-width: 90vw; position: relative; }
    #tm-box h3 { font-family: 'Syne', sans-serif; font-size: 1rem; margin-bottom: 4px; }
    #tm-file { font-size: 0.68rem; color: var(--muted); margin-bottom: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #tm-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
    #tm-close:hover { color: var(--text); }
    .tm-cur { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; min-height: 28px; }
    .tm-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-size: 0.68rem; cursor: pointer; }
    .tm-tag:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .tm-tag::after { content: '×'; font-size: 0.85rem; }
    .tm-notag { font-size: 0.68rem; color: var(--muted); align-self: center; }
    .tm-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    #tag-input { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.72rem; outline: none; transition: border-color 0.15s; }
    #tag-input:focus { border-color: var(--accent); }
    #tag-input::placeholder { color: var(--muted); }
    #tag-add-btn { padding: 8px 14px; border-radius: var(--radius); background: var(--accent); color: #000; border: none; font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 600; cursor: pointer; }
    #tag-add-btn:hover { background: #c8ff70; }
    .tm-sug { margin-top: 4px; }
    .tm-sug-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 7px; }
    .tm-sug-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .tm-sug-pill { padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); font-size: 0.62rem; color: var(--muted); cursor: pointer; transition: all 0.1s; }
    .tm-sug-pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* SUMMARY BAR */
    #summary-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 8px 20px; font-size: 0.72rem; color: var(--muted); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    #summary-bar.visible { opacity: 1; }
    .sbi { display: flex; align-items: center; gap: 5px; }
    .sbd { width: 7px; height: 7px; border-radius: 50%; }
    .sbt { color: var(--text); font-weight: 600; padding-left: 4px; border-left: 1px solid var(--border); }

    #toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 16px; font-size: 0.72rem; color: var(--text); opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 300; }
    #toast.show { opacity: 1; }

    #img-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px; margin-bottom: 16px;
      border-radius: var(--radius); border: 1px solid var(--accent);
      background: var(--accent-dim); cursor: pointer;
      font-size: 0.78rem; font-weight: 600; color: var(--accent);
      transition: background 0.15s;
    }
    #img-banner:hover { background: rgba(181,255,90,0.2); }
    #img-banner .ib-hint { font-size: 0.65rem; color: var(--muted); font-weight: 400; }

    /* EDIT MODE */
    #btn-edit { border-color: var(--yellow-dim); color: var(--muted); }
    #btn-edit:hover { border-color: var(--yellow); background: var(--yellow-dim); color: var(--yellow); }
    #btn-edit.active { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); font-weight: 600; }
    body.edit-mode #btn-edit { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); font-weight: 600; }
    body.edit-mode .asset-item { cursor: pointer; }
    body:not(.edit-mode) .asset-item { cursor: pointer; }
    .ql-btn { display: none; position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 12px; cursor: pointer; align-items: center; justify-content: center; z-index: 5; transition: all 0.15s; }
    body.edit-mode .asset-item:hover .ql-btn { display: flex; }
    .ql-btn:hover { border-color: var(--accent); color: var(--accent); }
    #pw-backdrop { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
    #pw-backdrop.open { display: flex; }
    #pw-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; width: 340px; max-width: 90vw; position: relative; text-align: center; }
    #pw-icon { font-size: 2.5rem; margin-bottom: 12px; }
    #pw-box h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 6px; }
    #pw-hint { font-size: 0.72rem; color: var(--muted); margin-bottom: 20px; font-style: italic; }
    #pw-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
    #pw-close:hover { color: var(--text); }
    .pw-input-row { display: flex; gap: 8px; }
    #pw-input { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; outline: none; transition: border-color 0.15s; text-align: center; letter-spacing: 0.1em; }
    #pw-input:focus { border-color: var(--accent); }
    #pw-submit { padding: 8px 16px; border-radius: var(--radius); background: var(--accent); color: #000; border: none; font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 600; cursor: pointer; }
    #pw-submit:hover { background: #c8ff70; }
    #pw-error { font-size: 0.7rem; color: var(--red); margin-top: 10px; min-height: 18px; }

    /* QUICK-LOOK MODAL */
    #ql-backdrop { display: none; position: fixed; inset: 0; z-index: 250; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
    #ql-backdrop.open { display: flex; }
    #ql-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: min(600px, 90vw); width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    #ql-close { position: absolute; top: 12px; right: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 1.1rem; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
    #ql-close:hover { color: var(--text); border-color: var(--accent); }
    #ql-img-wrap { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
    #ql-img { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 6px; }
    #ql-name { font-size: 0.75rem; color: var(--muted); text-align: center; word-break: break-all; }
    #ql-status-row { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; }
    .ql-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #ql-toggle-media { display: none; position: absolute; bottom: 14px; left: 50px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 1rem; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s; }
    #ql-tag-row { width: 100%; }
    #ql-tag-input { width: 100%; box-sizing: border-box; padding: 7px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; outline: none; transition: border-color 0.15s; }
    #ql-tag-input:focus { border-color: var(--accent); }
    #ql-tag-input::placeholder { color: var(--muted); }
    #ql-link-video { display: none; background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.68rem; padding: 5px 16px; border-radius: 20px; cursor: pointer; transition: border-color 0.15s, color 0.15s; font-family: 'DM Mono', monospace; }
    #ql-link-video:hover { border-color: var(--blue); color: var(--blue); }
    body.edit-mode #ql-link-video { display: inline-block; }
    #ql-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .ql-tag { padding: 3px 10px; border-radius: 20px; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-size: 0.68rem; display: flex; align-items: center; gap: 5px; }
    .ql-tag-del { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.75rem; padding: 0; line-height: 1; opacity: 0.6; display: none; }
    .ql-tag-del:hover { opacity: 1; }
    body.edit-mode .ql-tag-del { display: inline; }
    #ql-nav { display: flex; align-items: center; gap: 16px; margin-top: 4px; }
    #ql-prev, #ql-next { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 1rem; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, background 0.15s; }
    #ql-prev:hover, #ql-next:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    #ql-counter { font-size: 0.68rem; color: var(--muted); min-width: 50px; text-align: center; }
    #ql-download { position: absolute; bottom: 14px; left: 14px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 1rem; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s; }
    #ql-download:hover { border-color: var(--accent); color: var(--accent); }

    body.images-only .asset-name { display: none !important; }
    body.images-only .asset-tags { display: none !important; }
    body.images-only .status-pip { display: none !important; }
    body.images-only .tag-btn { display: none !important; }
    body.images-only .asset-item { border-color: transparent !important; background: transparent !important; }
    body.no-dot .status-pip { display: none !important; }

    mark { background: rgba(181,255,90,0.2); color: var(--accent); border-radius: 2px; padding: 0 1px; }
  </style>
</head>
<body>

      <button class="filter-btn"        id="f-green"  onclick="setFilter('green')"><span class="fb-dot" style="background:var(--green)"></span>Have files<span class="fb-count" id="fc-green">0</span></button>
      <button class="filter-btn"        id="f-red"    onclick="setFilter('red')"><span class="fb-dot" style="background:var(--red)"></span>Missing<span class="fb-count" id="fc-red">0</span></button>
      <button class="filter-btn"        id="f-yellow" onclick="setFilter('yellow')"><span class="fb-dot" style="background:var(--yellow)"></span>Need to request<span class="fb-count" id="fc-yellow">0</span></button>
      <button class="filter-btn"        id="f-blue"   onclick="setFilter('blue')"><span class="fb-dot" style="background:var(--blue)"></span>Animated<span class="fb-count" id="fc-blue">0</span></button>
    </div>
    <div class="ss" id="tag-filter-section" style="display:none">
      <div class="sl" style="display:flex;align-items:center;justify-content:space-between;">Tags<button id="tag-expand-btn" onclick="toggleTagExpand()" style="background:none;border:none;color:var(--muted);font-size:0.65rem;cursor:pointer;padding:0;font-family:'DM Mono',monospace;"></button></div>
      <div class="tag-pill-list" id="tag-filter-list"></div>

    <div class="ss">
      <div class="sl">Cell size</div>
      <div class="size-btns">
        <button class="size-btn" id="sz-xs" onclick="setSize('xs')">XS</button>
        <button class="size-btn" id="sz-s"  onclick="setSize('s')">S</button>
        <button class="size-btn active" id="sz-m"  onclick="setSize('m')">M</button>
        <button class="size-btn" id="sz-l"  onclick="setSize('l')">L</button>
      </div>
    </div>
    <div class="ss">
      <div class="toggle-row">
        <span>Status tint</span>
        <label class="toggle-switch"><input type="checkbox" id="tint-toggle" checked><span class="toggle-track"></span></label>
      </div>
      <div class="toggle-row" style="margin-top:8px">
        <span>Status dot</span>
        <label class="toggle-switch"><input type="checkbox" id="dot-toggle" checked><span class="toggle-track"></span></label>
      </div>
    </div>
    <div class="ss">
      <div class="toggle-row">

      </div>
    </div>
    <div class="ss" style="flex:1;overflow-y:auto;border-bottom:none">
      <div class="sl">Categories</div>

    </div>
  </div>

  <div id="main">

    <div id="img-banner" style="display:none" onclick="syncImages()">
      <span id="img-banner-text">🖼 Click to load images</span>
      <span class="ib-hint">browser needs one click per session</span>

    <div id="search-banner"><span id="sb-text"></span><span class="sbc" id="sb-clr">clear</span></div>
    <div id="app"></div>

</div>

<div id="summary-bar">
  <div class="sbi"><div class="sbd" style="background:var(--green)"></div><span id="sum-g">0</span></div>
  <div class="sbi"><div class="sbd" style="background:var(--red)"></div><span id="sum-r">0</span></div>

<script>
  // ── CONFIG (edit these after deploying) ──────────────────────────────────
  // These are stored in localStorage after first setup, so only needed once.
  const CONFIG_KEYS = { token: 'at_gh_token', repo: 'at_gh_repo', path: 'at_gh_path' };
  const DEFAULT_FILENAME = 'asset_tracker_data.json';
  // ─────────────────────────────────────────────────────────────────────────

  let statuses = {}, tags = {}, assets = [], videoLinks = {};
  let activeFilter = new Set(), activeTagFilter = null, searchQuery = '';
  let activeImgHandle = null, activeWorkHandle = null, activeVideoHandle = null;
  let tagTarget = null;
  let ghFileSha = null;
  let editMode = false;
  let videoBlobMap = {}; // filename (no ext) → blob URL, populated at runtime
  let saveTimer, toastT, searchTimer, zoomRaf, _lastHideNames = null;
  const STATUS_CYCLE = [null,'green','red','yellow','blue'];

  // ── LOCALSTORAGE CONFIG ──
  const getCfg = k => localStorage.getItem(CONFIG_KEYS[k]) || '';
  const setCfg = (k,v) => localStorage.setItem(CONFIG_KEYS[k], v);
  const hasCfg = () => getCfg('token') && getCfg('repo') && getCfg('path');

  // ── INDEXEDDB (image folder handle only) ──
  const dbP = new Promise(res => { try { const r=indexedDB.open('AssetTrackerV4',1); r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains('h')) db.createObjectStore('h'); if(!db.objectStoreNames.contains('thumbs')) db.createObjectStore('thumbs'); }; r.onsuccess=e=>res(e.target.result); r.onerror=()=>res(null); } catch{res(null);} });
  async function saveH(k,v){try{const db=await dbP;if(!db)return;db.transaction('h','readwrite').objectStore('h').put(v,k);}catch{}}
  async function getH(k){try{const db=await dbP;if(!db)return null;return new Promise(r=>{const q=db.transaction('h').objectStore('h').get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)});}catch{return null;}}
  async function clearH(){try{const db=await dbP;if(!db)return;db.transaction('h','readwrite').objectStore('h').clear();}catch{}}
  async function getThumb(k){try{const db=await dbP;if(!db)return null;return new Promise(r=>{const q=db.transaction('thumbs').objectStore('thumbs').get(k);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null)});}catch{return null;}}
  async function saveThumb(k,blob){try{const db=await dbP;if(!db)return;db.transaction('thumbs','readwrite').objectStore('thumbs').put(blob,k);}catch{}}
  async function clearThumbs(){try{const db=await dbP;if(!db)return;db.transaction('thumbs','readwrite').objectStore('thumbs').clear();}catch{}}

  // ── ZOOM ──
  // ── SIZE ──
  const SIZES = { xs: 70, s: 110, m: 150, l: 220 };
  function setSize(key){
    const v = SIZES[key];
    document.documentElement.style.setProperty('--cell', v+'px');
    document.body.classList.toggle('hide-names', v < 90);
    ['xs','s','m','l'].forEach(k => document.getElementById('sz-'+k).classList.toggle('active', k===key));
    localStorage.setItem('atZoom', key);
    // Auto-switch dot/tint defaults per size (only if user hasn't manually set them)
    if(!localStorage.getItem('atDot') && !localStorage.getItem('atTint')){
      const dotOn = key !== 'xs';
      document.getElementById('dot-toggle').checked = dotOn;
      document.body.classList.toggle('no-dot', !dotOn);
      document.getElementById('tint-toggle').checked = true;
      document.body.classList.remove('no-tint');
    }
  }
  const savedSize = localStorage.getItem('atZoom') || 'm';
  const validSize = SIZES[savedSize] ? savedSize : 'm';
  setSize(validSize);

  // ── TINT ──
  const tintToggle = document.getElementById('tint-toggle');
  tintToggle.checked = localStorage.getItem('atTint') !== 'off';
  document.body.classList.toggle('no-tint', !tintToggle.checked);
  tintToggle.addEventListener('change', () => { document.body.classList.toggle('no-tint', !tintToggle.checked); localStorage.setItem('atTint', tintToggle.checked ? 'on' : 'off'); });

  // ── DOT ──
  const dotToggle = document.getElementById('dot-toggle');
  if(localStorage.getItem('atDot') !== null){
    dotToggle.checked = localStorage.getItem('atDot') !== 'off';
  } else {
    dotToggle.checked = validSize !== 'xs';
  }
  document.body.classList.toggle('no-dot', !dotToggle.checked);
  dotToggle.addEventListener('change', () => { document.body.classList.toggle('no-dot', !dotToggle.checked); localStorage.setItem('atDot', dotToggle.checked ? 'on' : 'off'); });

  const imgOnlyToggle = document.getElementById('imgonly-toggle');
  imgOnlyToggle.checked = localStorage.getItem('atImgOnly') === 'on';
  document.body.classList.toggle('images-only', imgOnlyToggle.checked);
  imgOnlyToggle.addEventListener('change', () => { document.body.classList.toggle('images-only', imgOnlyToggle.checked); localStorage.setItem('atImgOnly', imgOnlyToggle.checked ? 'on' : 'off'); });

  // ── SEARCH ──
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', e=>{
    searchInput.classList.toggle('has-value', !!e.target.value);
    clearTimeout(searchTimer);
    searchTimer=setTimeout(()=>{searchQuery=e.target.value.trim().toLowerCase();render();},80);
  });
  document.getElementById('search-clear').addEventListener('click', clearSearch);
  document.getElementById('sb-clr').addEventListener('click', clearSearch);
  function clearSearch(){searchInput.value='';searchInput.classList.remove('has-value');searchQuery='';render();}

  // ── TOAST & STATUS ──
  function toast(m,d=2400){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),d);}
  function setStatus(s,t){document.getElementById('status-bar').className=s;document.getElementById('status-text').textContent=t;}

  // ── HELPERS ──
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function hi(text,q){if(!q)return esc(text);const i=text.toLowerCase().indexOf(q);if(i<0)return esc(text);return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));}

  // ── GITHUB API ──
  function ghHeaders(){ return { 'Authorization': 'token '+getCfg('token'), 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }; }
  function ghUrl(){ return `https://api.github.com/repos/${getCfg('repo')}/contents/${getCfg('path')}`; }

  async function ghLoad(){
    setStatus('saving','Loading from GitHub…');
    try {
      const res = await fetch(ghUrl(), { headers: ghHeaders() });
      if(res.status === 404){
        ghFileSha = null;
        setStatus('synced','Ready');
        return {statuses:{}, tags:{}, videoLinks:{}};
      }
      if(!res.ok) throw new Error('HTTP '+res.status);
      const json = await res.json();
      ghFileSha = json.sha;
      const raw = JSON.parse(atob(json.content.replace(/\n/g,'')));
      // migrate old flat format
      if(raw.statuses !== undefined || raw.tags !== undefined) return {statuses: raw.statuses||{}, tags: raw.tags||{}, videoLinks: raw.videoLinks||{}};
      return {statuses: raw, tags: {}, videoLinks: {}};
    } catch(e){
      setStatus('error', 'GitHub error');
      toast('⚠ Could not load from GitHub: '+e.message);
      return {statuses:{}, tags:{}, videoLinks:{}};
    }
  }

  let ghSavePromise = Promise.resolve();
  function ghSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      ghSavePromise = ghSavePromise.then(async ()=>{
        try {
          setStatus('saving','Saving…');
          const content = btoa(unescape(encodeURIComponent(JSON.stringify({statuses,tags,videoLinks},null,2))));
          const body = { message: 'Update asset statuses', content };
          if(ghFileSha) body.sha = ghFileSha;
          const res = await fetch(ghUrl(), { method:'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
          if(res.status === 409){
            // SHA conflict — fetch latest SHA and retry once
            const fresh = await fetch(ghUrl(), { headers: ghHeaders() });
            if(fresh.ok){ const fj = await fresh.json(); ghFileSha = fj.sha; }
            const body2 = { message: 'Update asset statuses', content };
            if(ghFileSha) body2.sha = ghFileSha;
            const res2 = await fetch(ghUrl(), { method:'PUT', headers: ghHeaders(), body: JSON.stringify(body2) });
            if(!res2.ok) throw new Error('HTTP '+res2.status);
            const json2 = await res2.json();
            ghFileSha = json2.content.sha;
          } else {
            if(!res.ok) throw new Error('HTTP '+res.status);
            const json = await res.json();
            ghFileSha = json.content.sha;
          }
          setStatus('synced','Saved');
        } catch(e){
          console.error('[ghSave]', e);
          setStatus('error','Save failed');
          toast('⚠ Could not save: '+e.message);
        }
      });
    }, 800);
  }

  // ── INIT ──
  async function init(){
    if(!hasCfg()){
      renderSetup();
      return;
    }
    // Load data from GitHub
    const d = await ghLoad();
    statuses = d.statuses; tags = d.tags; videoLinks = d.videoLinks;
    setStatus('synced','Loaded');

    // Try to restore image folder handle
    const imgH = await getH('img');
    const workH = await getH('work');
    const videoH = await getH('video');
    updateImgBtn(imgH);
    updateVideoBtn(videoH);

    if(imgH){
      try {
        const perm = await imgH.queryPermission({mode:'read'});
        if(perm === 'granted'){
          activeImgHandle = imgH;
          activeWorkHandle = workH || null;
          if(videoH){ const vp = await videoH.queryPermission({mode:'read'}); if(vp==='granted'){ activeVideoHandle=videoH; await buildVideoBlobMap(); } }
          await loadImages();
          document.getElementById('btn-scan').disabled = !workH;
          return;
        }
        showImgBanner(imgH.name);
      } catch(e){ showImgBanner(imgH ? imgH.name : ''); }
    } else {
      renderNeedsImages();
    }
  }

  // ── SETUP SCREEN ──
  function renderSetup(){
    document.getElementById('app').innerHTML='';
    document.getElementById('setup-screen').innerHTML=`
      <div class="setup-title">Set up <span>Asset Tracker</span></div>
      <p class="setup-sub">One-time setup. Your token and repo are saved in your browser's localStorage — they never leave your machine.</p>

      <div class="setup-card" id="sc-token">
        <h3><span class="step-badge">1</span> GitHub Personal Access Token</h3>
        <p>Create a token at <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--blue)">github.com/settings/tokens/new</a>.<br>
        Scopes needed: tick <code>repo</code> (or just <code>public_repo</code> if your repo is public).<br>
        Copy the token — you only see it once.</p>
        <div class="setup-input-row">
          <input class="setup-input" id="inp-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value="${getCfg('token')}">
          <button class="setup-btn" onclick="saveToken()">Save</button>
        </div>
      </div>

      <div class="setup-card" id="sc-repo">
        <h3><span class="step-badge">2</span> Repository & file path</h3>
        <p>The repo where your data file will live, and the path to the JSON file inside it.<br>
        Example repo: <code>yourname/asset-tracker</code><br>
        Example path: <code>data/asset_tracker_data.json</code></p>
        <div class="setup-input-row" style="margin-bottom:8px">
          <input class="setup-input" id="inp-repo" placeholder="username/repo-name" value="${getCfg('repo')}">
        </div>
        <div class="setup-input-row">
          <input class="setup-input" id="inp-path" placeholder="data/asset_tracker_data.json" value="${getCfg('path')||DEFAULT_FILENAME}">

  async function buildVideoBlobMap(){
    if(!activeVideoHandle) return;
    videoBlobMap = {};
    async function scanDir(dirH){
      for await(const [name, h] of dirH.entries()){
        if(h.kind==='file' && /\.(mp4|webm|mov)$/i.test(name)){
          const base = name.replace(/\.[^/.]+$/,'').toLowerCase();
          const f = await h.getFile();
          videoBlobMap[base] = URL.createObjectURL(f);
        } else if(h.kind==='directory') await scanDir(h);
      }
    }
    await scanDir(activeVideoHandle);
    // After building, mark all auto-matched images as blue
    let changed = 0;
    const videoKeys = Object.keys(videoBlobMap);
    assets.forEach(cat => cat.items.forEach(item => {
      const manualVideoName = videoLinks[item.name];
      if(manualVideoName){
        const manualBase = manualVideoName.replace(/\.[^/.]+$/,'').toLowerCase();
        if(videoBlobMap[manualBase] && item.status !== 'blue'){ item.status='blue'; statuses[item.name]='blue'; changed++; }
        return;
      }
      const base = item.name.replace(/\.[^/.]+$/,'').toLowerCase();
      const stripped = base.replace(/_[\w\d]+$/, '');
      const hasVideo = !!videoBlobMap[base] || (stripped.length >= 5 && videoKeys.some(k => k.startsWith(stripped)));
      if(hasVideo && item.status !== 'blue'){ item.status='blue'; statuses[item.name]='blue'; changed++; }
    }));
    if(changed){ render(); ghSave(); toast(`🎬 ${changed} illustrations marked animated`); }
  }

  function getVideoSrc(item){
    const manualBase = videoLinks[item.name] ? videoLinks[item.name].replace(/\.[^/.]+$/,'').toLowerCase() : null;
    if(manualBase) return videoBlobMap[manualBase] || null;

    const autoBase = item.name.replace(/\.[^/.]+$/,'').toLowerCase();
    // 1. Exact match
    if(videoBlobMap[autoBase]) return videoBlobMap[autoBase];
    // 2. Strip trailing variant suffix (_3, _v2, _final etc) and try prefix match
    // e.g. "row 71_ verification_3" → "row 71_ verification"
    const stripped = autoBase.replace(/_[\w\d]+$/, '');
    const videoKeys = Object.keys(videoBlobMap);
    // Find a video whose key starts with the stripped image base
    const match = videoKeys.find(k => k.startsWith(stripped) && stripped.length >= 5);
    return match ? videoBlobMap[match] : null;
  }

  // ── LOAD IMAGES ──
  async function collectImages(dirH, arr){
    for await(const [name,h] of dirH.entries()){
      if(h.kind==='file'){
        const f = await h.getFile();
        if(f.type.startsWith('image/'))
          arr.push({name:f.name, src:null, fullSrc:URL.createObjectURL(f), fileRef:f, status:statuses[f.name]||null, tags:[...(tags[f.name]||[])]});
      } else if(h.kind==='directory') await collectImages(h, arr);
    }
  }

  async function generateThumb(file, maxSize=220){
    return new Promise(res=>{
      const img=new Image(); img.onload=()=>{
        const scale=Math.min(1, maxSize/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d');
        ctx.clearRect(0,0,w,h); // keep transparent
        ctx.drawImage(img,0,0,w,h);
        // Use webp for smaller size with transparency, fall back to png
        c.toBlob(b=>{ if(b) res(b); else c.toBlob(b2=>res(b2),'image/png'); },'image/webp',0.85);
      }; img.onerror=()=>res(null);
      img.src=URL.createObjectURL(file);
    });
  }

  async function loadImages(){
    setStatus('saving','Loading images…');
    assets = [];
    for await(const [name,h] of activeImgHandle.entries()){
      if(h.kind==='directory'){
        const items = []; await collectImages(h, items);
        items.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'}));
        if(items.length) assets.push({categoryName:name, items});
      }
    }
    assets.sort((a,b)=>a.categoryName.localeCompare(b.categoryName));

    // Load cached thumbs first — fast
    let thumbMisses = [];
    await Promise.all(assets.flatMap(cat=>cat.items.map(async item=>{
      const blob = await getThumb(item.name);
      if(blob){ item.src = URL.createObjectURL(blob); }
      else { item.src = item.fullSrc; thumbMisses.push(item); }
    })));

    setStatus('synced','Ready');
    render();

    // Generate missing thumbs in background batches
    if(thumbMisses.length){
      setStatus('saving', `Generating ${thumbMisses.length} thumbnails…`);
      let done=0;
      const BATCH=8;
      for(let i=0;i<thumbMisses.length;i+=BATCH){
        const batch=thumbMisses.slice(i,i+BATCH);
        await Promise.all(batch.map(async item=>{
          const blob = await generateThumb(item.fileRef);
          if(!blob) return;
          await saveThumb(item.name, blob);
          const thumbUrl = URL.createObjectURL(blob);
          // Swap src in DOM without re-render
          item.src = thumbUrl;
          const imgEl = document.querySelector(`.asset-item[data-ci][data-ii] img, .gallery img`);
          // Find the right img element by iterating assets
          assets.forEach((cat,ci)=>{ const ii=cat.items.indexOf(item); if(ii>=0){ const card=document.querySelector(`.asset-item[data-ci="${ci}"][data-ii="${ii}"]`); if(card){ const el=card.querySelector('img'); if(el) el.src=thumbUrl; } } });
          done++;
        }));
        setStatus('saving',`Generating thumbnails… ${done}/${thumbMisses.length}`);
        await new Promise(r=>setTimeout(r,0)); // yield to browser
      }
      setStatus('synced','Ready');
    }
  }

  // ── AUTO SCAN ──
  function fuzzyMatch(ib, fn){
    const ci = ib.toLowerCase().replace(/[^a-z0-9]/g,'');
    const cf = fn.toLowerCase().replace(/[^a-z0-9]/g,'');
    if(!ci || !cf) return false;
    // exact match
    if(ci === cf) return true;
    // only allow substring match if the base name is at least 5 chars long
    if(ci.length >= 5 && cf.includes(ci)) return true;
    if(cf.length >= 5 && ci.includes(cf)) return true;
    // word overlap — at least 75% of words in image name found in folder/file name
    const wi = ib.toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>2);
    const wf = fn.toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>2);
    if(wi.length >= 2 && wi.filter(w=>wf.includes(w)).length / wi.length >= 0.75) return true;
    // longest common substring — only if both names are long enough
    if(ci.length < 6 || cf.length < 6) return false;
    const dp=Array(ci.length+1).fill(0).map(()=>Array(cf.length+1).fill(0)); let mx=0;
    for(let i=1;i<=ci.length;i++) for(let j=1;j<=cf.length;j++) if(ci[i-1]===cf[j-1]){dp[i][j]=dp[i-1][j-1]+1;mx=Math.max(mx,dp[i][j]);}
    return mx>=6 && mx/ci.length>=0.75 && mx/cf.length>=0.75;
  }
  async function collectWorkNames(dirH, arr, depth){
    depth = depth||0;
    for await(const [name,h] of dirH.entries()){
      if(h.kind==='file'){
        arr.push(name.replace(/\.[^/.]+$/,'').toLowerCase());
      } else if(h.kind==='directory'){
        arr.push(name.toLowerCase());
        await collectWorkNames(h, arr, depth+1);
      }
      // yield to browser every 200 entries so page stays responsive
      if(arr.length % 200 === 0){
        setStatus('saving', `Scanning… ${arr.length} found`);
        await new Promise(r=>setTimeout(r,0));
      }
    }
  }
  async function autoScanWorkFiles(){
    if(!activeWorkHandle){
      await linkWorkFolder();
      if(!activeWorkHandle) return;
    }
    if(!assets.length){ toast('Load images first'); return; }
    setStatus('saving','Scanning…');
    const names=[];
    await collectWorkNames(activeWorkHandle, names);
    setStatus('saving',`Matching ${names.length} entries…`);
    await new Promise(r=>setTimeout(r,0));
    let changed=0;
    assets.forEach(cat=>cat.items.forEach(item=>{
      if(item.status==='yellow'||item.status==='blue'||item.status==='green') return;
      const base=item.name.replace(/\.[^/.]+$/,'').toLowerCase();
      const found=names.some(n=>fuzzyMatch(base,n));
      const next=found?'green':'red';
      if(item.status!==next){item.status=next;statuses[item.name]=next;changed++;}
    }));
    if(changed){render();ghSave();setStatus('synced','Ready');toast(`✓ Scan done — ${changed} updated`);}
    else{toast('✓ Scan done — nothing changed');setStatus('synced','Ready');}
  }

  // ── VISIBILITY ──
  function itemVisible(item){
    if(activeFilter.size>0&&!activeFilter.has(item.status||null)) return false;
    if(activeTagFilter&&!(item.tags||[]).includes(activeTagFilter)) return false;
    if(searchQuery){
      const words = searchQuery.split(/\s+/).filter(Boolean);
      const itemTags = (item.tags||[]).map(t=>t.toLowerCase());
      const itemName = item.name.toLowerCase();
      if(!words.every(w => itemName.includes(w) || itemTags.some(t=>t.includes(w)))) return false;
    }
    return true;
  }

  // ── FILTER ──
  function setFilter(f){
    if(f===null){
      activeFilter.clear();
    } else {
      if(activeFilter.has(f)) activeFilter.delete(f); else activeFilter.add(f);
    }
    ['green','red','yellow','blue'].forEach(k=>document.getElementById('f-'+k).classList.toggle('active', activeFilter.has(k)));
    document.getElementById('f-all').classList.toggle('active', activeFilter.size===0);
    render();
  }

  function getAllTags(){const m={};assets.forEach(c=>c.items.forEach(i=>(i.tags||[]).forEach(t=>{m[t]=(m[t]||0)+1;})));return m;}

  let tagListExpanded = false;
  const TAG_COMPACT_LIMIT = 30;

  function toggleTagExpand(){
    tagListExpanded = !tagListExpanded;
    buildTagFilterSidebar();
  }

  function buildTagFilterSidebar(){
    const all=getAllTags(),keys=Object.keys(all).sort();
    const sec=document.getElementById('tag-filter-section'),list=document.getElementById('tag-filter-list');
    if(!keys.length){sec.style.display='none';return;}
    sec.style.display='block'; list.innerHTML='';
    const showAll = tagListExpanded || keys.length <= TAG_COMPACT_LIMIT;
    const visible = showAll ? keys : keys.slice(0, TAG_COMPACT_LIMIT);
    visible.forEach(t=>{
      const p=document.createElement('div');
      p.className='tag-pill'+(activeTagFilter===t?' active':'');
      p.innerHTML=esc(t)+' <span class="tp-n">'+all[t]+'</span>';
      p.onclick=()=>{activeTagFilter=activeTagFilter===t?null:t;render();};
      list.appendChild(p);
    });
    const btn = document.getElementById('tag-expand-btn');
    if(keys.length > TAG_COMPACT_LIMIT){
      btn.textContent = showAll ? '▲ less' : `▼ +${keys.length - TAG_COMPACT_LIMIT} more`;
    } else {
      btn.textContent = '';
    }
  }

  // ── RENDER ──
  function render(){
    const app=document.getElementById('app'); app.innerHTML='';
    updateCounts(); buildCatNav(); buildTagFilterSidebar();

    const banner=document.getElementById('search-banner');
    if(searchQuery){
      let mc=0; assets.forEach(c=>c.items.forEach(i=>{if(itemVisible(i))mc++;}));
      banner.classList.add('vis');
      document.getElementById('sb-text').innerHTML=`<strong>${mc}</strong> result${mc!==1?'s':''} for "<strong>${esc(searchQuery)}</strong>"`;
    } else banner.classList.remove('vis');

    if(!assets.length) return;

    assets.forEach((cat,ci)=>{
      const visible=cat.items.filter(itemVisible);
      if(!visible.length) return;

      const sec=document.createElement('div'); sec.className='cat-section'; sec.id='cat-'+ci;
      const cg=cat.items.filter(i=>i.status==='green').length;
      const cr=cat.items.filter(i=>i.status==='red').length;
      const cy=cat.items.filter(i=>i.status==='yellow').length;
      const cb=cat.items.filter(i=>i.status==='blue').length;

      const hdr=document.createElement('div'); hdr.className='cat-header';
      hdr.innerHTML=`<span class="cat-name">${esc(cat.categoryName)}</span><span class="cat-count">${visible.length}</span>
        <div class="cat-stats">
          <div class="cat-stat"><div class="csd" style="background:var(--green)"></div>${cg}</div>
          <div class="cat-stat"><div class="csd" style="background:var(--red)"></div>${cr}</div>
          <div class="cat-stat"><div class="csd" style="background:var(--yellow)"></div>${cy}</div>
          <div class="cat-stat"><div class="csd" style="background:var(--blue)"></div>${cb}</div>
        </div>`;
      sec.appendChild(hdr);

      const gallery=document.createElement('div'); gallery.className='gallery';

      visible.forEach(item=>{
        const idx=cat.items.indexOf(item);
        const div=document.createElement('div');
        div.className='asset-item'+(item.status?' s-'+item.status:'')+((item.tags&&item.tags.length)?' has-tags':'');
        div.dataset.ci=ci; div.dataset.ii=idx;

        const tb=document.createElement('button'); tb.className='tag-btn'; tb.textContent='#'; tb.title='Edit tags';
        tb.onclick=e=>{e.stopPropagation();openTagModal(ci,idx);};

        const qlb=document.createElement('button'); qlb.className='ql-btn'; qlb.textContent='⌕'; qlb.title='Quick look';
        qlb.onclick=e=>{e.stopPropagation();openQuickLook(item);};

        const img=document.createElement('img'); img.src=item.src; img.loading='lazy';

        const nameEl=document.createElement('div'); nameEl.className='asset-name';
        nameEl.innerHTML=hi(item.name,searchQuery);

        const tagsEl=document.createElement('div'); tagsEl.className='asset-tags';
        (item.tags||[]).forEach(t=>{
          const chip=document.createElement('span'); chip.className='asset-tag-chip';
          chip.innerHTML=hi(t,searchQuery);
          chip.onclick=e=>{e.stopPropagation();activeTagFilter=t;render();};
          tagsEl.appendChild(chip);
        });

        const pip=document.createElement('div');
        pip.className='status-pip'+(item.status?' pip-'+item.status:'');

        div.onclick=()=>{ if(editMode) toggleStatus(ci,idx); else openQuickLook(item); };
        div.appendChild(tb); div.appendChild(qlb); div.appendChild(img);
        div.appendChild(nameEl); div.appendChild(tagsEl); div.appendChild(pip);
        gallery.appendChild(div);
      });

      sec.appendChild(gallery); app.appendChild(sec);
    });

    if(!app.children.length){
      app.innerHTML='<div class="empty-state"><div class="esi">🔍</div><p>No results match your filters.</p></div>';
    }

    updateSummaryBar();
  }

  function updateCounts(){
    let all=0,g=0,r=0,y=0,b=0;
    assets.forEach(c=>c.items.forEach(i=>{all++;if(i.status==='green')g++;else if(i.status==='red')r++;else if(i.status==='yellow')y++;else if(i.status==='blue')b++;}));
    document.getElementById('fc-all').textContent=all;
    document.getElementById('fc-green').textContent=g;
    document.getElementById('fc-red').textContent=r;
    document.getElementById('fc-yellow').textContent=y;
    document.getElementById('fc-blue').textContent=b;

  function buildCatNav(){
    const nav=document.getElementById('cat-nav'); nav.innerHTML='';
    assets.forEach((cat,ci)=>{
      const el=document.createElement('div'); el.className='cat-nav-item';
      el.innerHTML=esc(cat.categoryName)+' <span class="cn-c">'+cat.items.length+'</span>';
      el.onclick=()=>document.getElementById('cat-'+ci)?.scrollIntoView({behavior:'smooth',block:'start'});

  function updateSummaryBar(){
    let total=0,g=0,r=0,y=0,b=0;
    assets.forEach(c=>c.items.forEach(i=>{
      if(!itemVisible(i)) return;
      total++;
      if(i.status==='green')g++; else if(i.status==='red')r++; else if(i.status==='yellow')y++; else if(i.status==='blue')b++;
    }));
    document.getElementById('summary-bar').classList.toggle('visible',total>0);
    document.getElementById('sum-g').textContent=g;
    document.getElementById('sum-r').textContent=r;
    document.getElementById('sum-y').textContent=y;
    document.getElementById('sum-b').textContent=b;
    document.getElementById('sum-t').textContent=total+' total';
  }

  // ── TOGGLE STATUS — pure in-place DOM patch, no render() ──
  function toggleStatus(ci,ii){
    if(!editMode){ return; } // guard — shouldn't be called in view mode but just in case
    if(!assets[ci]||!assets[ci].items[ii]){ console.error('[toggle] bad index',ci,ii,assets.length); return; }
    const item=assets[ci].items[ii];
    const prev=item.status;
    const next=STATUS_CYCLE[(STATUS_CYCLE.indexOf(prev)+1)%STATUS_CYCLE.length];
    item.status=next;
    if(next===null) delete statuses[item.name]; else statuses[item.name]=next;

    // patch card
    const card=document.querySelector(`.asset-item[data-ci="${ci}"][data-ii="${ii}"]`);
    if(card){
      if(prev) card.classList.remove('s-'+prev);
      if(next) card.classList.add('s-'+next);
      const pip=card.querySelector('.status-pip');
      if(pip) pip.className='status-pip'+(next?' pip-'+next:'');
    }

    updateCounts();
    updateSummaryBar();
    ghSave(); // debounced — won't fire until 600ms after last click
  }

  }
  document.getElementById('tm-close').onclick=closeModal;
  document.getElementById('tm-backdrop').addEventListener('click',e=>{if(e.target===document.getElementById('tm-backdrop'))closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  document.getElementById('tag-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addTagFromInput();}});
  document.getElementById('tag-add-btn').onclick=addTagFromInput;
  function closeModal(){document.getElementById('tm-backdrop').classList.remove('open');tagTarget=null;}

  function renderModalTags(item){
    const el=document.getElementById('tm-cur'); el.innerHTML='';
    if(!item.tags||!item.tags.length){el.innerHTML='<span class="tm-notag">No tags yet</span>';return;}
    item.tags.forEach(t=>{const d=document.createElement('div');d.className='tm-tag';d.textContent=t;d.title='Click to remove';d.onclick=()=>removeTag(t);el.appendChild(d);});
  }
  function renderModalSugs(item){
    const el=document.getElementById('tm-sug'); el.innerHTML='';
    const all=getAllTags();
    const existing=new Set(item.tags||[]);
    const others=Object.keys(all).filter(t=>!existing.has(t)).sort((a,b)=>all[b]-all[a]).slice(0,14);
    if(!others.length) return;
    el.innerHTML='<div class="tm-sug-lbl">Existing tags</div><div class="tm-sug-pills" id="tm-pills"></div>';
    const pills=document.getElementById('tm-pills');
    others.forEach(t=>{const p=document.createElement('div');p.className='tm-sug-pill';p.textContent=t;p.onclick=()=>applyTag(t);pills.appendChild(p);});
  }
  function addTagFromInput(){const input=document.getElementById('tag-input');const val=input.value.trim().toLowerCase().replace(/\s+/g,' ');if(!val)return;applyTag(val);input.value='';}
  function applyTag(tag){
    if(!tagTarget) return;
    const item=assets[tagTarget.ci].items[tagTarget.ii];
    if(!item.tags) item.tags=[];
    if(item.tags.includes(tag)){toast('Tag already added');return;}
    item.tags.push(tag); tags[item.name]=[...item.tags];
    renderModalTags(item); renderModalSugs(item);
    // update card tags in-place
    const card=document.querySelector(`.asset-item[data-ci="${tagTarget.ci}"][data-ii="${tagTarget.ii}"]`);
    if(card){
      card.classList.add('has-tags');
      const tagsEl=card.querySelector('.asset-tags'); tagsEl.innerHTML='';
      item.tags.forEach(t=>{const chip=document.createElement('span');chip.className='asset-tag-chip';chip.textContent=t;chip.onclick=e=>{e.stopPropagation();activeTagFilter=t;render();};tagsEl.appendChild(chip);});
    }
    buildTagFilterSidebar(); ghSave();
  }
  function removeTag(tag){
    if(!tagTarget) return;
    const item=assets[tagTarget.ci].items[tagTarget.ii];
    item.tags=(item.tags||[]).filter(t=>t!==tag);
    if(item.tags.length) tags[item.name]=item.tags; else delete tags[item.name];
    renderModalTags(item); renderModalSugs(item);
    const card=document.querySelector(`.asset-item[data-ci="${tagTarget.ci}"][data-ii="${tagTarget.ii}"]`);
    if(card){
      if(!item.tags.length) card.classList.remove('has-tags');
      const tagsEl=card.querySelector('.asset-tags'); tagsEl.innerHTML='';
      item.tags.forEach(t=>{const chip=document.createElement('span');chip.className='asset-tag-chip';chip.textContent=t;chip.onclick=e=>{e.stopPropagation();activeTagFilter=t;render();};tagsEl.appendChild(chip);});
    }
    buildTagFilterSidebar(); ghSave();
  }

  // ── EXPORT ──
  function exportData(){
    let out='Assets to Request:\n\n'; let found=false;
    assets.forEach(cat=>{
      const yItems=cat.items.filter(i=>i.status==='yellow');
      if(!yItems.length) return;
      found=true;
      out+=`--- ${cat.categoryName.toUpperCase()} ---\n`;
      yItems.forEach(i=>{out+=`[Need to Request] ${i.name}`+(i.tags&&i.tags.length?` [tags: ${i.tags.join(', ')}]`:'')+'\n';});
      out+='\n';
    });
    if(!found){toast('No "Need to Request" items to export');return;}
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([out],{type:'text/plain'}));
    a.download='Asset_Request_List.txt'; a.click(); toast('✓ Exported');
  }

  // ── RESET ──
  async function clearAll(){
    if(!confirm('Reset everything? This clears your GitHub config, folder links, and filters. Your data file on GitHub is untouched.')) return;
    await clearH(); await clearThumbs();
    Object.values(CONFIG_KEYS).forEach(k=>localStorage.removeItem(k));
    assets=[]; statuses={}; tags={}; activeFilter=new Set(); activeTagFilter=null; searchQuery=''; ghFileSha=null;
    activeImgHandle=activeWorkHandle=null;
    document.getElementById('app').innerHTML='';
    searchInput.value=''; searchInput.classList.remove('has-value');
    document.getElementById('summary-bar').classList.remove('visible');
    setStatus('','—');
    init();
  }

  // ── EDIT MODE ──
  function toggleEditMode(){
    if(editMode){
      exitEditMode();
    } else {
      document.getElementById('pw-input').value='';
      document.getElementById('pw-error').textContent='';
      document.getElementById('pw-backdrop').classList.add('open');
      setTimeout(()=>document.getElementById('pw-input').focus(), 50);
    }
  }
  function exitEditMode(){
    editMode = false;
    document.body.classList.remove('edit-mode');
    document.getElementById('btn-edit').textContent = '🔒 Edit Mode';
    toast('Edit mode off');
  }
  function submitPassword(){
    const val = document.getElementById('pw-input').value.trim().toLowerCase();
    if(val === 'neepal'){
      editMode = true;
      document.body.classList.add('edit-mode');
      document.getElementById('btn-edit').textContent = '🔓 Editing';
      document.getElementById('pw-backdrop').classList.remove('open');
      toast('✓ Edit mode on — click cards to change status');
    } else {
      document.getElementById('pw-error').textContent = 'Wrong password, try again.';
      document.getElementById('pw-input').value='';
      document.getElementById('pw-input').focus();
    }
  }
  document.getElementById('pw-close').onclick = () => document.getElementById('pw-backdrop').classList.remove('open');
  document.getElementById('pw-backdrop').addEventListener('click', e => { if(e.target===document.getElementById('pw-backdrop')) document.getElementById('pw-backdrop').classList.remove('open'); });
  document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') submitPassword(); });

  // ── QUICK LOOK ──
  const STATUS_LABELS = { green:'Have files', red:'Missing', yellow:'Need to request', blue:'Animated' };
  const STATUS_COLORS = { green:'var(--green)', red:'var(--red)', yellow:'var(--yellow)', blue:'var(--blue)' };
  let qlItems = [], qlIndex = 0;

  function openQuickLook(item){
    // Build flat list of all currently visible items for arrow navigation
    qlItems = [];
    assets.forEach(cat => cat.items.filter(itemVisible).forEach(i => qlItems.push(i)));
    qlIndex = qlItems.indexOf(item);
    renderQuickLook(item);
    document.getElementById('ql-backdrop').classList.add('open');
  }

  function renderQuickLook(item){
    const videoSrc = getVideoSrc(item);
    const imgEl = document.getElementById('ql-img');
    const vidEl = document.getElementById('ql-video');
    const toggleBtn = document.getElementById('ql-toggle-media');

    imgEl.src = item.fullSrc || item.src;
    vidEl.src = videoSrc || '';
    vidEl.style.display = 'none';
    imgEl.style.display = '';

    if(videoSrc){
      toggleBtn.style.display = 'flex';
      toggleBtn.textContent = '▶';
      toggleBtn._showingVideo = false;
    } else {
      toggleBtn.style.display = 'none';
    }

    document.getElementById('ql-name').textContent = item.name;
    const sr = document.getElementById('ql-status-row');
    if(item.status){
      sr.innerHTML = `<div class="ql-status-dot" style="background:${STATUS_COLORS[item.status]}"></div><span>${STATUS_LABELS[item.status]||item.status}</span>`;
    } else {
      sr.innerHTML = '<span style="color:var(--muted)">No status set</span>';
    }
    const tl = document.getElementById('ql-tags');
    tl.innerHTML = '';
    if(item.tags && item.tags.length){
      item.tags.forEach(t => { const d=document.createElement('div'); d.className='ql-tag'; d.textContent=t; const x=document.createElement('button'); x.className='ql-tag-del'; x.textContent='×'; x.onclick=()=>qlRemoveTag(item,t); d.appendChild(x); tl.appendChild(d); });
    }
    document.getElementById('ql-counter').textContent = qlItems.length > 1 ? `${qlIndex+1} / ${qlItems.length}` : '';
    // Update link-video button label
    document.getElementById('ql-link-video').textContent = videoSrc ? '🎬 Relink video' : '＋ Link video';
    document.getElementById('ql-link-video')._item = item;
    // Show inline tag input in edit mode
    document.getElementById('ql-tag-row').style.display = editMode ? 'block' : 'none';
    document.getElementById('ql-tag-input').value = '';
    document.getElementById('ql-tag-input')._item = item;
    if(editMode) setTimeout(()=>document.getElementById('ql-tag-input').focus(), 80);
  }

  function qlNavigate(dir){
    if(!qlItems.length) return;
    const vidEl = document.getElementById('ql-video');
    vidEl.pause();
    qlIndex = (qlIndex + dir + qlItems.length) % qlItems.length;
    renderQuickLook(qlItems[qlIndex]);
  }

  document.getElementById('ql-close').addEventListener('click', () => { document.getElementById('ql-video').pause(); document.getElementById('ql-backdrop').classList.remove('open'); });
  document.getElementById('ql-backdrop').addEventListener('click', e => { if(e.target===document.getElementById('ql-backdrop')) document.getElementById('ql-backdrop').classList.remove('open'); });
  function qlRemoveTag(item, tag){
    item.tags = (item.tags||[]).filter(t=>t!==tag);
    if(item.tags.length) tags[item.name]=[...item.tags]; else delete tags[item.name];
    const tl=document.getElementById('ql-tags'); tl.innerHTML='';
    item.tags.forEach(t=>{ const d=document.createElement('div'); d.className='ql-tag'; d.textContent=t; const x=document.createElement('button'); x.className='ql-tag-del'; x.textContent='×'; x.onclick=()=>qlRemoveTag(item,t); d.appendChild(x); tl.appendChild(d); });
    ghSave();
  }

  document.getElementById('ql-tag-input').addEventListener('keydown', e => {
    const input = e.currentTarget;
    const item = input._item;
    if(e.key === 'Enter'){
      e.stopPropagation();
      const val = input.value.trim().toLowerCase().replace(/\s+/g,' ');
      if(!val || !item) return;
      if(!item.tags) item.tags = [];
      if(!item.tags.includes(val)){
        item.tags.push(val);
        tags[item.name] = [...item.tags];
        // re-render tags in quick look
        const tl = document.getElementById('ql-tags'); tl.innerHTML='';
        item.tags.forEach(t=>{ const d=document.createElement('div'); d.className='ql-tag'; d.textContent=t; const x=document.createElement('button'); x.className='ql-tag-del'; x.textContent='×'; x.onclick=()=>qlRemoveTag(item,t); d.appendChild(x); tl.appendChild(d); });
        ghSave();
      }
      input.value = '';
    } else if((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && input.value === ''){
      // Navigate when input is empty
      e.preventDefault();
      qlNavigate(e.key === 'ArrowLeft' ? -1 : 1);
    } else {
      e.stopPropagation(); // prevent arrow keys from navigating while typing
    }
  });
  document.getElementById('ql-next').onclick = e => { e.stopPropagation(); qlNavigate(1); };

  document.getElementById('ql-toggle-media').onclick = e => {
    e.stopPropagation();
    const btn = e.currentTarget;
    const imgEl = document.getElementById('ql-img');
    const vidEl = document.getElementById('ql-video');
    btn._showingVideo = !btn._showingVideo;
    if(btn._showingVideo){
      imgEl.style.display = 'none'; vidEl.style.display = ''; vidEl.play();
      btn.textContent = '🖼';
    } else {
      vidEl.pause(); vidEl.style.display = 'none'; imgEl.style.display = '';
      btn.textContent = '▶';
    }
  };

  document.getElementById('ql-link-video').onclick = async e => {
    e.stopPropagation();
    const item = e.currentTarget._item;
    if(!item) return;
    try {
      const [fileHandle] = await window.showOpenFilePicker({ types: [{ description: 'Video', accept: { 'video/*': ['.mp4','.webm','.mov'] } }] });
      const file = await fileHandle.getFile();
      const base = file.name.replace(/\.[^/.]+$/,'').toLowerCase();
      videoBlobMap[base] = URL.createObjectURL(file);
      videoLinks[item.name] = file.name;
      // Mark as blue
      if(item.status !== 'blue'){ item.status = 'blue'; statuses[item.name] = 'blue'; }
      ghSave(); render();
      renderQuickLook(item);
      toast('✓ Video linked to ' + item.name);
    } catch(e){ if(e.name !== 'AbortError') toast('Could not open file'); }
  };

  document.getElementById('ql-download').onclick = e => {
    e.stopPropagation();
    const img = document.getElementById('ql-img');
    const a = document.createElement('a');
    a.href = img.src;
    a.download = document.getElementById('ql-name').textContent;
    a.click();
  };
  document.addEventListener('keydown', e => {
    const qlOpen = document.getElementById('ql-backdrop').classList.contains('open');
    if(qlOpen && e.key==='ArrowLeft'){ qlNavigate(-1); return; }
    if(qlOpen && e.key==='ArrowRight'){ qlNavigate(1); return; }
    if(e.key==='Escape'){ closeModal(); document.getElementById('ql-backdrop').classList.remove('open'); document.getElementById('pw-backdrop').classList.remove('open'); }
  });

  init();
</script>
</body>
</html>
